<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Guitar and Ukulele Example Fretboards</title>
</head>
<body>
<h1>Example Fretboards</h1>
<div id="ukulele-all"></div>
<div id="ukulele-eb"></div>
<div id="ukulele-notes"></div>
<div id="guitar-all"></div>

<script src="../dist/traste.js"></script>

<script>
    const uke1 = new traste.Fretboard(traste.ukulele, '#ukulele-all');
    uke1.drawNotes();

    const uke2 = new traste.Fretboard(traste.ukulele, '#ukulele-eb');
    uke2.drawNotes(['Eb', 'G', 'Bb']);

    const uke3 = new traste.Fretboard(traste.ukulele, '#ukulele-notes');
    uke3.drawNoteAtPosition('Eb', 2, 3);
    uke3.drawNoteAtPosition('G', 1, 3);
    uke3.drawNoteAtPosition('Bb', 3, 3);
    uke3.drawNoteAtPosition('Db', 0, 4);

    const guitar = new traste.Fretboard(traste.guitar, '#guitar-all');
    guitar.drawNotes();
</script>

</body>
</html>
